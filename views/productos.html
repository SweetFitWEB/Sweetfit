<div class="productos-header">
  <h2>Menú</h2>
  <div class="acciones-header">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." />
    <button class="btn-agregar-producto">➕ Agregar producto</button>
    <button id="btnAprobaciones" style="background:#f39c12; color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; cursor:pointer; margin-left:10px;"><i class="fi fi-br-list-check"></i> Aprobaciones</button>
  </div>
</div>

<!-- FILTROS DE LA CATEGORIAS -->
<div class="filtros-categorias" id="filtrosCategorias">
  <!-- AQUI IRAN LAS CATEGORIAS DE FORMA DINAMICA SACADAS DEL app.py Y DEL script.js-->
</div>

<div class="grid-productos" id="gridProductos">
  <!-- AQUI SE INSERTARAN LOS PRODUCTOS DESDE LA BASE DE DATOS -->
</div>

<div class="paginacion" id="paginacionProductos">
  <!-- Los botones se insertarán dinámicamente con JS -->
</div>

<!-- MODAL PARA AGREGAR/EDITAR PRODUCTO -->
<div id="modalAgregarProducto" class="modal">
  <div class="modal-contenido modal-producto-mejorado">
    <span id="cerrarModal" class="cerrar-modal">&times;</span>
    
    <div class="modal-producto-header">
      <div class="modal-producto-icono">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </div>
      <h3 id="tituloModal">Agregar nuevo producto</h3>
    </div>

    <form id="formAgregarProducto" enctype="multipart/form-data" method="POST">
      <input type="hidden" id="productoId" name="id_producto" />
      <input type="hidden" name="_method" value="PUT">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="nombre">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Nombre del producto
          </label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: Ensalada César" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="categoria">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
            Categoría
          </label>
          <select id="categoria" name="categoria" required>
            <option value="">Seleccionar categoría</option>
            <option value="Ensaladas">Ensaladas</option>
            <option value="Jugos y Licuados">Jugos y Licuados</option>
            <option value="Proteína">Proteína</option>
            <option value="Snacks Fit">Snacks Fit</option>
            <option value="Bowls">Bowls</option>
            <option value="Bebidas">Bebidas</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="descripcion">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Descripción
        </label>
        <textarea id="descripcion" name="descripcion" placeholder="Describe el producto..." rows="2" required></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="precio">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Precio
          </label>
          <div class="input-wrapper">
            <span class="input-prefix">$</span>
            <input type="number" id="precio" name="precio" placeholder="0.00" step="0.01" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="cantidad">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            Stock
          </label>
          <input type="number" id="cantidad" name="cantidad" placeholder="0" min="0" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="imagen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Imagen del producto
        </label>
        <div class="image-upload-area" id="imageUploadArea">
          <img id="previewImagen" class="image-preview" />
          <span class="image-upload-overlay" id="btnCambiarImagen">Cambiar imagen</span>
          <div class="image-upload-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p>Haz clic para subir una imagen</p>
            <span class="image-upload-hint">PNG, JPG o WEBP</span>
          </div>
          <input type="file" id="imagen" name="imagen" accept="image/*" />
        </div>
      </div>

      <div class="modal-producto-footer">
        <button type="button" class="btn-cancelar-modal" id="btnCancelarModal">Cancelar</button>
        <button type="submit" class="btn-guardar-modal" id="btnGuardarProducto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Guardar producto</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Modal de Aprobaciones -->
<div class="modal" id="modalAprobaciones">
  <div class="modal-contenido" style="max-width: 600px;">
    <span class="cerrar-modal" id="cerrarModalAprobaciones">&times;</span>
    <h3>Aprobaciones Pendientes (Extranet)</h3>
    <div id="listaAprobaciones" style="margin-top:20px; max-height: 400px; overflow-y:auto;">
      <!-- Se cargarán los productos pendientes aquí -->
    </div>
  </div>
</div>
