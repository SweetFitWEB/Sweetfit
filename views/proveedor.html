<div class="proveedores-header">
  <div class="acciones-proveedor">
    <input type="text" id="buscadorProveedores" placeholder="🔍 Buscar proveedor..." />
    <button class="btn-agregar-proveedor"><i class="fi fi-br-user-add"></i> Agregar Proveedor</button>
    <button class="btn-nueva-compra">🛒 Nueva Compra</button>
  </div>
</div>

<table class="tabla-proveedores">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Email</th>
      <th>Teléfono</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="listaProveedores">
    <!-- Aquí se insertarán dinámicamente los proveedores -->
  </tbody>
</table>

<div class="modal" id="modalProveedor">
  <div class="modal-contenido modal-proveedor-mejorado">
    <div class="modal-producto-header">
      <div class="modal-producto-icono">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <h3 id="tituloModalProveedor">Agregar Proveedor</h3>
      <span id="cerrarModalProveedor" class="cerrar-modal">×</span>
    </div>
    <form id="formProveedor">
      <input type="hidden" name="id_proveedor" />

      <div class="form-group">
        <label class="form-label" for="provNombre">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Nombre del proveedor
        </label>
        <input type="text" id="provNombre" name="nombre" placeholder="Ej: Distribuidora ABC" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="provEmail">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            Email
          </label>
          <input type="email" id="provEmail" name="email" placeholder="proveedor@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="provTelefono">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
            </svg>
            Teléfono
          </label>
          <input type="text" id="provTelefono" name="telefono" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="provContrasena">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          Contraseña
        </label>
        <input type="password" id="provContrasena" name="contrasena" placeholder="Contraseña para acceso a extranet" />
        <span style="font-size:0.75rem;color:var(--color-texto-claro);margin-top:0.1rem;">Obligatorio al crear. Al
          editar, dejar vacío para no cambiar.</span>
      </div>

      <div class="modal-producto-footer">
        <button type="button" class="btn-cancelar-modal" id="cancelarEdicion">Cancelar</button>
        <button type="submit" class="btn-guardar-modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          <span>Guardar</span>
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modalCompra">
  <div class="modal-contenido grande">
    <span class="cerrar-modal" onclick="cerrarModalCompra()">×</span>
    <h3>🛒 Nueva Compra a Proveedores</h3>
    <form id="formCompra">
      <!-- Seleccionar Proveedor -->
      <div class="compra-seccion">
        <label for="proveedorSelect" class="compra-label"><i class="fi fi-br-truck-box"></i> Proveedor:</label>
        <select id="proveedorSelect" name="proveedor" required class="compra-select"></select>
      </div>

      <!-- Agregar Productos Grid -->
      <div class="compra-seccion compra-add-box">
        <h4 class="compra-subsec-titulo">Agregar Productos a la Compra</h4>
        <div class="compra-producto-grid">
          <div class="grid-field">
            <label for="productoSelect">Producto:</label>
            <select id="productoSelect" name="producto" class="compra-select"></select>
          </div>
          <div class="grid-field" style="max-width: 120px;">
            <label for="cantidadProducto">Cantidad:</label>
            <input type="number" id="cantidadProducto" name="cantidad" placeholder="Cant." min="1"
              class="compra-input" />
          </div>
          <div class="grid-field-btn">
            <button type="button" class="btn-agregar-compra-item" onclick="agregarProductoCompra()">➕ Agregar</button>
          </div>
        </div>
      </div>

      <!-- Resumen de Productos de la Compra -->
      <div class="compra-seccion">
        <h4 class="compra-subsec-titulo">Resumen de la Compra</h4>
        <div id="listaProductosCompra" class="compra-lista-resumen">
          <p class="compra-vacio-msg">Aún no se han agregado productos a esta compra.</p>
        </div>
      </div>

      <!-- Guardar Compra -->
      <button type="submit" class="btn-guardar-compra"> Guardar Compra</button>
    </form>
  </div>
</div>

<div class="historial-compras">
  <h3>📜 Historial de Compras</h3>
  <div class="filtro-fecha">
    <label for="filtroFecha">📅 Filtrar por fecha:</label>
    <input type="date" id="filtroFecha" />
  </div>
  <div id="tablaHistorialCompras" class="tarjetas-historial">
  </div>
</div>
<div id="modalTicket" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close" onclick="document.getElementById('modalTicket').style.display='none'">&times;</span>
    <div id="contenidoTicket"></div>
  </div>
</div>
