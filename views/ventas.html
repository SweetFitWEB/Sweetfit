<div class="ventas-contenedor">
  <!-- Formulario Nueva Venta -->
  <div class="formulario-venta">
    <h2>Registrar Nueva Venta</h2>
    <form id="formVenta">
      
      <!-- Información del cliente -->
      <fieldset class="grupo-cliente">
        <legend>Datos del Cliente (opcional para factura)</legend>
        <div class="grid-form">
          <input type="text" id="nombreCliente" name="nombre_cliente" placeholder="Nombre(s) del cliente" />
          <input type="text" id="apellidoPaterno" name="apellido_paterno" placeholder="Apellido paterno" />
          <input type="text" id="apellidoMaterno" name="apellido_materno" placeholder="Apellido materno" />
          <input type="text" id="direccionCliente" name="direccion" placeholder="Dirección" />
          <input type="tel" id="telefonoCliente" name="telefono" placeholder="Teléfono (10 dígitos)" pattern="[0-9]{10}" />
        </div>
      </fieldset>

      <!-- Información general de la venta -->
      <div class="grid-form">
        <input type="text" id="empleado" name="empleado" placeholder="Empleado" readonly class="input-deshabilitado"/>
        <select id="tipoVenta" name="tipo_venta" required>
          <option value="">Tipo de Venta</option>
          <option value="Local">Local</option>
          <option value="Domicilio">Domicilio</option>
          <option value="App">App</option>
        </select>
      </div>

      <button type="button" class="btn-agregar-producto" onclick="abrirModalProductos()">Seleccionar Productos</button>

      <!-- Tabla carrito -->
      <table class="lista-productos-seleccionados" id="tablaCarrito">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Subtotal</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody>
          <!-- productos se agregan con JS -->
        </tbody>
      </table>

      <div class="footer-venta">
        <strong>Total: $<span id="totalVenta">0.00</span></strong>
        <button type="button" class="btn-agregar-producto"id="btnRegistrarVenta" onclick="registrarVenta()">Registrar venta</button>
        <button type="button" class="btn-agregar-producto" id="btnGuardarEspera" onclick="guardarEnEspera()">Guardar en espera</button>
      </div>
    </form>
  </div>

  <!-- Historial de ventas -->
  <div class="historial-ventas">
    <h3>Historial de Ventas</h3>

    <div>
      <input type="date" id="filtroFechaInicio" />
      <input type="date" id="filtroFechaFin" />
      <select id="filtroTipo">
        <option value="">Todos los Tipos</option>
        <option value="Local">Local</option>
        <option value="Domicilio">Domicilio</option>
        <option value="App">App</option>
      </select>
      <button class="btn-agregar-producto" onclick="filtrarVentas()">Filtrar</button>
    </div>

    <div>
      <table id="tablaVentas" class="lista-productos-seleccionados">
        <thead>
          <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Empleado</th>
            <th>Total</th>
            <th>Estatus</th>
            <th>Detalle</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- registros dinámicos con JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal para seleccionar productos -->
<div class="modal" id="modalSeleccionarProductos">
  <div class="modal-contenido modal-productos-seleccion">
    <div class="modal-producto-header">
      <div class="modal-producto-icono">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <h3>Seleccionar Productos</h3>
      <span class="cerrar-modal" onclick="cerrarModalProductos()">&times;</span>
    </div>
    <div class="modal-productos-body">
      <div class="modal-productos-buscador">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="buscador-modal" placeholder="Buscar producto..." />
      </div>
      <div class="grid-modal-productos" id="gridModalProductos">
        <!-- Tarjetas dinámicas -->
      </div>
      <div class="contenedor-paginacion-modal">
        <div id="paginacionModalProductos" class="paginacion-modal-productos"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Detalle de Venta -->
<div class="modal" id="modalDetalleVenta">
  <div class="modal-contenido modal-venta-detalle">
    <div class="modal-producto-header">
      <div class="modal-producto-icono">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <h3>Detalle de Venta</h3>
      <span class="cerrar-modal" onclick="cerrarModalDetalleVenta()">&times;</span>
    </div>
    <div class="modal-venta-body" id="detalleVentaContenido">
      <!-- Cargado dinámicamente -->
    </div>
    <div class="modal-producto-footer">
      <button type="button" class="btn-cancelar-modal" onclick="cerrarModalDetalleVenta()">Cerrar</button>
      <button type="button" class="btn-guardar-modal" onclick="imprimirTicket()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span>Imprimir Ticket</span>
      </button>
    </div>
  </div>
</div>
