<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweetfit - Portal de Proveedores</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Iconos de Flaticon -->
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
  <style>
    body.extranet-login-body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ABBF7F 0%, #8FA865 100%);
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
    .extranet-login-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .extranet-login-container h1 {
      color: #6B8A45;
      margin-bottom: 5px;
    }
    .extranet-login-container p {
      color: #666;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #ABBF7F;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-login:hover {
      background: #8FA865;
    }
    .error-msg {
      color: #e74c3c;
      margin-top: 15px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body class="extranet-login-body">
  <div class="extranet-login-container">
    <h1><i class="fi fi-br-truck-box"></i> Sweetfit</h1>
    <p>Portal de Proveedores</p>
    
    <form id="formExtranetLogin">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required placeholder="ejemplo@proveedor.com" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="Tu contraseña" />
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
      <div id="loginError" class="error-msg">Credenciales inválidas. Inténtalo de nuevo.</div>
    </form>
    <div style="margin-top: 20px;">
      <a href="login.html" style="color: #6B8A45; text-decoration: none; font-size: 14px;">Volver al panel administrativo</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/extranet_login.js"></script>
</body>
</html>
